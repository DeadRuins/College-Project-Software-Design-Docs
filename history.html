<!DOCTYPE html>
<html>
<head>
    <title>Camera History Archive</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .nav-btn { display: inline-block; padding: 10px 20px; background: #444; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
        .nav-btn:hover { background: #555; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #333; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .card img { max-width: 100%; border-radius: 4px; display: block; margin-bottom: 8px; }
        .timestamp { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <h1>Captured History Archive</h1>
    <a href="/" class="nav-btn">← Back to Live Feed</a>

    <div class="grid">
        {% for img_name in images %}
            <div class="card">
                <img src="/past_images/{{ img_name }}" alt="Captured image">
                <div class="timestamp">
                    Captured: {{ img_name[0:4] }}-{{ img_name[4:6] }}-{{ img_name[6:8] }} 
                    {{ img_name[9:11] }}:{{ img_name[11:13] }}:{{ img_name[13:15] }}
                </div>
            </div>
        {% else %}
            <p style="grid-column: 1 / -1; color: #888;">No historical images found yet.</p>
        {% endfor %}
    </div>

</body>
</html>
